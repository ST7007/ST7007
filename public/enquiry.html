<!DOCTYPE html>
<html>
<head>
    <title>LuxRide Enquiry</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: Arial; 
            background: #000; 
            margin: 0; 
            padding: 0; 
        }
        header { 
            background: orange; 
            color: white; 
            padding: 16px; 
            text-align: center; 
            font-size: 22px; 
            font-weight: bold; 
        }
        .container { 
            max-width: 850px; 
            margin: 20px auto; 
            background: #111; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 0 12px rgba(255,165,0,0.5); 
            color: white; 
        }
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            column-gap: 10px;  
            row-gap: 8px;     
        }
        .full-width { 
            grid-column: 1 / -1; 
        }
        label { 
            font-weight: bold; 
            display: block; 
            margin-bottom: 3px; 
            font-size: 13px;
        }
        input, select, textarea { 
            width: 100%; 
            padding: 4px 8px; 
            border-radius: 6px; 
            border: 2px solid orange; 
            font-size: 13px; 
            background: #fff; 
            color: #000; 
        }
        textarea { 
            resize: vertical; 
            min-height: 40px; 
        }
        .row { 
            display: flex; 
            gap: 4px; 
        }
        .row div { 
            flex: 0; 
            text-align: left; 
        }
        .row input[type="number"] { 
            width: 50px; 
            margin: 2px auto 0; 
            display: block; 
            padding: 3px; 
            font-size: 13px;
        }
        .consent { 
            display: flex; 
            align-items: center; 
            margin-top: 8px; 
            font-size: 13px;
        }
        .consent input { 
            width: auto; 
            margin-right: 8px; 
        }
        button { 
            width: 100%; 
            padding: 8px; 
            background: orange; 
            color: white; 
            font-weight: bold; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            margin-top: 12px; 
            font-size: 14px; 
        }
        button:hover { 
            background: #333; 
        }
        #thankYou { 
            margin-top: 16px; 
            font-weight: bold; 
            color: green; 
            font-size: 14px;
        }
        @media (max-width:768px) { 
            .grid { 
                grid-template-columns: 1fr; 
            } 
        }
    </style>
</head>
<body>

<header>LuxRide Enquiry</header>
<div class="container">

<form id="enquiryForm">
<div class="grid">

    <div><label>Full Name *</label><input type="text" name="fullName" required></div>
    <div><label>Company Name</label><input type="text" name="companyName"></div>
    <div><label>Email Address *</label><input type="email" name="email" required></div>
    <div><label>Mobile Number *</label><input type="text" name="mobile" required></div>
    <div><label>Date of Pickup *</label><input type="date" name="pickupDate" id="pickupDate" required></div>
    <div><label>Time of Pickup</label><input type="time" name="pickupTime" id="pickupTime"></div>

    <div><label>Pickup Location *</label><input type="text" id="origin" name="origin" required></div>
    <div><label>Drop-off Location *</label><input type="text" id="destination" name="destination" required></div>

    <div>
        <label>Number of Passengers *</label>
        <div class="row">
            <div>Adult<input type="number" name="adult" min="0" value="0" required></div>
            <div>Child &lt;4<input type="number" name="childUnder4" min="0" value="0"></div>
            <div>Child 4-7<input type="number" name="child4to7" min="0" value="0"></div>
        </div>
    </div>

    <div>
        <label>Number of Luggage</label>
        <div class="row">
            <div>Small<input type="number" name="smallLuggage" min="0" value="0"></div>
            <div>Medium<input type="number" name="mediumLuggage" min="0" value="0"></div>
            <div>Large<input type="number" name="largeLuggage" min="0" value="0"></div>
        </div>
    </div>

    <div class="full-width row">
        <div style="flex:1; min-width:150px; margin-right:4px;">
        <label>Vehicle Type *</label>
        <select name="vehicleType" id="vehicleType" required>
            <option value="">Select Vehicle</option>
            <option value="MPV 6 Seater">MPV 6 Seater Grand Scenic</option>
            <option value="MPV 6 Seater">MPV 6 Seater Alphard / Vellfire</option>
            <option value="Luxury Sedan">Luxury Sedan Mercedes-Benz E-Class</option>
            <option value="Luxury Sedan">Luxury Sedan Mercedes-Benz S-Class</option>
            <option value="Luxury Sedan">Luxury Sedan BMW 5 Series</option>
            <option value="Luxury Sedan">Luxury Sedan BMW 7 Series</option>
        </select>
    </div>
    <div style="flex:1; min-width:150px;">
        <label>Special Requirements</label>
        <textarea name="specialRequirements"></textarea>
    </div>
</div>

<div class="full-width consent">
    <input type="checkbox" name="consent" id="consentCheckbox" required>
    I agree to be contacted by LuxRide regarding my enquiry*
</div>

<div class="full-width"><button type="submit">Submit Enquiry</button></div>
</div>
</form>

<div id="thankYou"></div>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places"></script>
<script>
function initAutocomplete() {
    const origin = document.getElementById("origin");
    const destination = document.getElementById("destination");
    new google.maps.places.Autocomplete(origin);
    new google.maps.places.Autocomplete(destination);

    origin.value = "Somerset Road, 111 Somerset, Singapore";
    destination.value = "Airport Boulevard, Changi Airport (SIN), Singapore";

    document.getElementById("vehicleType").value = "MPV 6 Seater";
    document.getElementById("consentCheckbox").checked = true;

    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth()+1).padStart(2,'0');
    const dd = String(today.getDate()).padStart(2,'0');
    document.getElementById("pickupDate").value = `${yyyy}-${mm}-${dd}`;

    const hh = String(today.getHours()).padStart(2,'0');
    const min = String(today.getMinutes()).padStart(2,'0');
    document.getElementById("pickupTime").value = `${hh}:${min}`;
}
window.onload = initAutocomplete;

document.getElementById("enquiryForm").addEventListener("submit", function(e){
    e.preventDefault();
    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());

    fetch("/submit-enquiry", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {
        if(res.success){
            document.getElementById("thankYou").innerHTML = `Thank you <strong>${res.fullName}</strong>, we will contact you soon.`;
            this.reset();
            initAutocomplete();
        } else {
            document.getElementById("thankYou").innerText = res.message;
        }
    });
});
</script>

</body>
</html>
