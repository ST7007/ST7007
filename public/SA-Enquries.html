<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SA Enquiries</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    font-family: 'Montserrat','Roboto','Open Sans',Arial,sans-serif;
    background: #000;
    color: #fff;
    margin: 0;
    padding: 0;
}
header {
    background: black;
    color: orange;
    text-align: center;
    font-size: 33px;
    font-weight: bold;
    padding: 16px;
}
.container {
    max-width: 2400px;
    margin: 20px auto;
    background: black;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 12px black;
}
.tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}
.tabs button {
    flex: 1;
    padding: 10px;
    background: black;
    color: white;
    border: none;
    font-weight: bold;
    cursor: pointer;
    border-radius: 6px 6px 0 0;
}
.tabs button.active { background: #333; color: orange; }
.tab-content { display: none; }
.tab-content.active { display: block; }
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    font-size: 14px;
}
table th, table td {
    border: 1px solid rgb(253, 198, 97);
    padding: 8px;
    text-align: left;
    background: black;
    color: white;
}
table th { background: black; color: white; }
button.edit-btn, button.delete-btn {
    padding: 3px 7px;
    margin-right: 5px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}
button.edit-btn { background: #4CAF50; color: white; }
button.delete-btn { background: #f44336; color: white; }
select { padding: 2px 5px; border-radius: 4px; background: black; color: white; border: 1px solid rgb(253,198,97);}
</style>
</head>
<body>

<header>Admin Panel</header>

<div class="container" id="adminPanel">

    <div class="tabs">
        <button class="tab-btn active" data-tab="enquiriesTab">Enquiries</button>
        <button class="tab-btn" data-tab="driversTab">Drivers</button>
        <button class="tab-btn" data-tab="customersTab">Customers</button>
        <button class="tab-btn" data-tab="bookingsTab">Bookings</button>
    </div>

    <!-- Enquiries Table -->
    <div id="enquiriesTab" class="tab-content active">
        <table id="enquiriesTable">
            <thead>
                <tr id="enquiriesHeader"></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Drivers Table -->
    <div id="driversTab" class="tab-content">
        <table id="driversTable">
            <thead>
                <tr id="driversHeader"></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Customers Table -->
    <div id="customersTab" class="tab-content">
        <table id="customersTable">
            <thead>
                <tr id="customersHeader"></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Bookings Table -->
    <div id="bookingsTab" class="tab-content">
        <table id="bookingsTable">
            <thead>
                <tr id="bookingsHeader"></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<script>
// Tabs switching
document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(tab=>tab.classList.remove('active'));
        document.getElementById(btn.dataset.tab).classList.add('active');
    });
});

// Make table rows editable and add delete button
function makeTableInteractive(tableId){
    const table = document.getElementById(tableId);
    const tbody = table.querySelector('tbody');
    const thead = table.querySelector('thead tr');

    // Add Action column if not exists
    if(!thead.querySelector('.action-header')){
        const th = document.createElement('th');
        th.textContent = 'Action';
        th.classList.add('action-header');
        thead.appendChild(th);
    }

    tbody.querySelectorAll('tr').forEach(tr=>{
        if(tr.querySelector('.action-cell')) return; // skip if already added
        const td = document.createElement('td');
        td.classList.add('action-cell');

        // Edit button
        const editBtn = document.createElement('button');
        editBtn.textContent = 'Edit';
        editBtn.className = 'edit-btn';

        // Delete button
        const delBtn = document.createElement('button');
        delBtn.textContent = 'Delete';
        delBtn.className = 'delete-btn';

        td.appendChild(editBtn);
        td.appendChild(delBtn);
        tr.appendChild(td);

        // Add dropdown for "status" column
        const statusIndex = Array.from(thead.cells).findIndex(h=>h.textContent.toLowerCase() === 'status');
        if(statusIndex >= 0){
            const statusCell = tr.cells[statusIndex];
            const select = document.createElement('select');
            ['Quoted','Pending','Confirmed','Assigned','Complete'].forEach(opt=>{
                const option = document.createElement('option');
                option.value = opt;
                option.textContent = opt;
                if(statusCell.textContent === opt) option.selected = true;
                select.appendChild(option);
            });
            statusCell.innerHTML = '';
            statusCell.appendChild(select);
        }

        // Edit / Save logic
        editBtn.addEventListener('click', ()=>{
            const isEditing = editBtn.textContent === 'Edit';
            Array.from(tr.cells).forEach((cell, idx)=>{
                if(cell === td) return;
                if(cell.querySelector('select')) return; // skip dropdown
                cell.contentEditable = isEditing;
                if(isEditing){
                    cell.style.backgroundColor = '#222'; // dark background while editing
                    cell.style.color = '#fff';           // keep text white
                } else {
                    cell.style.backgroundColor = '';
                    cell.style.color = '';
                }
            });
            editBtn.textContent = isEditing ? 'Save' : 'Edit';

            if(!isEditing){
                const updatedData = Array.from(tr.cells).map(c=>{
                    if(c.querySelector('select')) return c.querySelector('select').value;
                    return c.textContent;
                });
                console.log('Updated row:', updatedData);
                // Send updatedData to backend via fetch/AJAX if needed
            }
        });

        // Delete logic
        delBtn.addEventListener('click', ()=>{
            if(confirm('Are you sure you want to delete this record?')){
                tr.remove();
                console.log('Deleted row');
                // Send delete request to backend if needed
            }
        });
    });
}

// Generic fetch & populate function
async function fetchData(apiUrl, tableId, headerId){
    try {
        const res = await fetch(apiUrl);
        const json = await res.json();
        if(!json.success) throw new Error(json.message);

        const tbody = document.querySelector(`#${tableId} tbody`);
        const thead = document.querySelector(`#${headerId}`);
        tbody.innerHTML = '';
        thead.innerHTML = '';

        if(json.data.length === 0) return;

        // Dynamically create headers from object keys
        const keys = Object.keys(json.data[0]);
        keys.forEach(k=>{
            const th = document.createElement('th');
            th.textContent = k;
            thead.appendChild(th);
        });

        // Insert rows
        json.data.forEach(row=>{
            const tr = document.createElement('tr');
            keys.forEach(k=>{
                const td = document.createElement('td');
                td.textContent = row[k] ?? '';
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });

        // Make table interactive
        makeTableInteractive(tableId);

    } catch(err){
        console.error(`Error fetching ${apiUrl}:`, err);
    }
}

// Fetch all tables
fetchData('/api/enquiries', 'enquiriesTable', 'enquiriesHeader');
fetchData('/api/drivers', 'driversTable', 'driversHeader');
fetchData('/api/customers', 'customersTable', 'customersHeader');
fetchData('/api/bookings', 'bookingsTable', 'bookingsHeader');
</script>

</body>
</html>
