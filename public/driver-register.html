<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Driver Registration - LuxRide</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { 
    font-family: 'Montserrat','Roboto',Arial,sans-serif; 
    background: #000; 
    color: #fff; 
    margin:0; padding:0;
}
header { 
    text-align:center; 
    font-size:28px; 
    margin-top:50px; 
    margin-bottom:50px; 
    color:orange; 
    font-weight:bold;
}
.container { 
    max-width: 1000px; 
    margin: 50px auto; 
    background:#111; 
    padding:20px; 
    border-radius:10px; 
    box-shadow:0 0 12px orange;
}
.personal-info {
    display: grid; 
    grid-template-columns: 1fr 1fr; 
    gap: 15px;
}
.personal-info > div {
    display: flex;
    flex-direction: column;
}
label { 
    font-weight:bold; 
    margin-bottom:5px;
}
input, select { 
    padding:8px; 
    border-radius:6px; 
    border:2px solid orange; 
    background:#fff; 
    color:#000; 
    box-sizing:border-box; 
    width:100%;
}
button { 
    grid-column: 1 / -1; 
    padding:12px; 
    background:orange; 
    color:#000; 
    font-weight:bold; 
    border:none; 
    border-radius:6px; 
    cursor:pointer; 
    margin-top:10px; 
    font-size:16px; 
}
button:hover { 
    background:#333; 
    color:orange; 
}
.file-row { 
    display: grid; 
    grid-template-columns: repeat(3, 1fr); 
    gap: 20px; 
    margin-top:20px;
}
.preview { 
    margin-top:5px; 
    max-height:100px; 
    border:1px solid orange; 
    border-radius:4px; 
}
#message { 
    margin-top:15px; 
    color:orange; 
    font-weight:bold; 
    text-align:center; 
}
@media (max-width:900px){
    .personal-info, .file-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>Driver Registration</header>
<div class="container">
<form id="driverForm" enctype="multipart/form-data">

  <!-- Personal Info -->
  <div class="personal-info">
    <div>
      <label>Full Name *</label>
      <input type="text" name="fullName" placeholder="Enter full name" required>
    </div>
    <div>
      <label>Email *</label>
      <input type="email" name="email" placeholder="Enter email address" required>
    </div>
    <div>
      <label>Mobile *</label>
      <input type="text" name="mobile" placeholder="Enter mobile number" required>
    </div>
    <div>
      <label>Password *</label>
      <input type="password" name="password" placeholder="Enter password" required>
    </div>
    <div>
      <label>Address</label>
      <input type="text" id="address" placeholder="Enter address" required>
    </div>
    <div>
      <label>Date of Birth</label>
      <input type="date" name="dob" required>
    </div>
    <div>
      <label>Vehicle Model</label>
      <input type="text" name="vehicleModel" placeholder="Enter vehicle model" required>
    </div>
    <div>
      <label>Plate Number</label>
      <input type="text" name="plateNumber" placeholder="Enter plate number" required>
    </div>
    <div>
      <label>Car Reg Date</label>
      <input type="date" name="carRegDate" required>
    </div>
    <div>
      <label>COE Expired Date</label>
      <input type="date" name="coeExpiredDate" required>
    </div>
    <div>
      <label>Insurance Start Date</label>
      <input type="date" name="insuranceStartDate" required>
    </div>
    <div>
      <label>Insurance Expired Date</label>
      <input type="date" name="insuranceExpiredDate" required>
    </div>
    <div>
      <label>Emergency Contact Name</label>
      <input type="text" name="emergencyName" required>
    </div>
    <div>
      <label>Emergency Phone</label>
      <input type="text" name="emergencyPhone" required>
    </div>
  </div>

  <!-- File Uploads -->
  <div class="file-row">
    <div>
      <label>IC Front *</label>
      <input type="file" name="icFront" accept=".jpg,.jpeg,.png" onchange="previewFile(this,'previewICFront')" required>
      <img id="previewICFront" class="preview" style="display:none">
    </div>
    <div>
      <label>IC Back *</label>
      <input type="file" name="icBack" accept=".jpg,.jpeg,.png" onchange="previewFile(this,'previewICBack')" required>
      <img id="previewICBack" class="preview" style="display:none">
    </div>
    <div>
      <label>Driving License *</label>
      <input type="file" name="drivingLicense" accept=".jpg,.jpeg,.png" onchange="previewFile(this,'previewDriving')" required>
      <img id="previewDriving" class="preview" style="display:none">
    </div>
  </div>

  <div class="file-row">
    <div>
      <label>PHV License *</label>
      <input type="file" name="phvLicense" accept=".jpg,.jpeg,.png" onchange="previewFile(this,'previewPHV')" required>
      <img id="previewPHV" class="preview" style="display:none">
    </div>
    <div>
      <label>Car Logcard *</label>
      <input type="file" name="carLogcard" accept=".jpg,.jpeg,.png" onchange="previewFile(this,'previewLogcard')" required>
      <img id="previewLogcard" class="preview" style="display:none">
    </div>
    <div>
      <label>Car Insurance *</label>
      <input type="file" name="carInsurance" accept=".jpg,.jpeg,.png" onchange="previewFile(this,'previewInsurance')" required>
      <img id="previewInsurance" class="preview" style="display:none">
    </div>
  </div>

  <button type="submit">Register</button>
  <div id="message"></div>

</form>
</div>

<script>
// Preview uploaded files
function previewFile(input, previewId){
  const file = input.files[0];
  const preview = document.getElementById(previewId);
  if(file){
    const reader = new FileReader();
    reader.onload = e => {
      preview.src = e.target.result;
      preview.style.display = 'block';
    };
    reader.readAsDataURL(file);
  } else {
    preview.style.display = 'none';
  }
}

// Submit driver form
document.getElementById('driverForm').addEventListener('submit', async e => {
  e.preventDefault();
  const form = new FormData(e.target);
  const message = document.getElementById('message');

  try {
    const res = await fetch('/register-driver', { method:'POST', body: form });
    const data = await res.json();
    if(data.success){
      message.innerText = data.message;
      e.target.reset();
      document.querySelectorAll('.preview').forEach(img=>img.style.display='none');
    } else {
      message.innerText = data.message || 'Registration failed';
    }
  } catch(err){
    console.error(err);
    message.innerText = 'Server error';
  }
});

// Google Maps Autocomplete
function initAutocomplete() {
  const addressInput = document.getElementById("address");
  if(addressInput){
    const autocomplete = new google.maps.places.Autocomplete(addressInput,{
      types:['geocode'], componentRestrictions:{country:'SG'}
    });
    autocomplete.addListener('place_changed', ()=> console.log(autocomplete.getPlace()));
  }

  // Auto-fill all date fields to today
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  const todayStr = `${yyyy}-${mm}-${dd}`;

  ['dob','carRegDate','coeExpiredDate','insuranceStartDate','insuranceExpiredDate']
  .forEach(name => {
    const input = document.querySelector(`input[name="${name}"]`);
    if(input) input.value = todayStr;
  });
}

// Initialize
window.onload = initAutocomplete;
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCU0_YSYwUpaa73zlS3Soj-ggWrkp6XH0w&libraries=places" async defer></script>
</body>
</html>
