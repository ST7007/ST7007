<!DOCTYPE html>
<html>
<head>
  <title>LuxRide Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>🚗 LuxRide Admin Dashboard</header>

<nav>
  <a href="dashboard.html">Dashboard</a>
  <a href="bookings.html">Bookings</a>
  <a href="drivers.html">Drivers</a>
  <a href="add-booking.html">Add Booking</a>
</nav>

<div class="container">
  <div class="card">
    <h2>Total Bookings: <span id="total"></span></h2>
  </div>
  <div class="card">
    <h2>Total Revenue: $<span id="revenue"></span></h2>
  </div>
</div>

<script>
fetch("/api/dashboard")
.then(res => res.json())
.then(data => {
  document.getElementById("total").innerText = data.totalBookings;
  document.getElementById("revenue").innerText = data.revenue;
});
</script>

</body>
</html>
