<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Customer Enquiry</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
document.addEventListener("DOMContentLoaded", function() {
  if (window.matchMedia('(display-mode: standalone)').matches) {
    const header = document.querySelector("header");
    if(header) header.style.display = "none";
  }
});
</script>

<style>

body {
    font-family: 'Montserrat','Roboto','Open Sans',Arial,sans-serif;
    font-size:16px;
    background:#000;
    color:#fff;
    margin:0;
}

header { 
    background:black;
    color:orange; 
    padding:16px; 
    text-align:center; 
    font-size:33px; 
    font-weight:bold; 
}

.container { 
    max-width:700px; 
    margin:20px auto; 
    background:#111; 
    padding:20px; 
    border-radius:10px; 
    box-shadow:0 0 12px orange; 
}

.grid { 
    display:grid; 
    grid-template-columns:1fr 1fr; 
    column-gap:20px;  
    row-gap:16px;     
}

.full-width { 
    grid-column:1/-1; 
}

label { 
    font-weight:bold; 
    display:block; 
    margin-bottom:7px; 
    font-size:15px;
}

input, select, textarea { 
    width:100%; 
    padding:8px; 
    border-radius:6px; 
    border:2px solid orange; 
    font-size:16px; 
    background:#fff; 
    color:#000; 
    box-sizing:border-box;
}

textarea { 
    resize:vertical; 
    min-height:80px; 
}

.row {
    display:flex;
    gap:10px;
}

.row div { 
    flex:1; 
}

.consent { 
    display:flex; 
    align-items:center; 
    margin-top:12px; 
    font-size:15px;
}

.consent input { 
    width:auto; 
    margin-right:10px; 
}

button { 
    width:100%; 
    padding:10px; 
    background:orange; 
    color:white; 
    font-weight:bold; 
    border:none; 
    border-radius:6px; 
    cursor:pointer; 
    margin-top:12px; 
    font-size:15px; 
}

button:hover { 
    background:#333; 
}

#thankYou { 
    margin-top:16px; 
    font-weight:bold; 
    color:orange; 
    font-size:14px;
}

@media (max-width:768px) { 
    .grid { grid-template-columns:1fr; } 
    .row { flex-direction:column; }
}

</style>
</head>

<body>

<header>Customer Enquiry</header>

<div class="container">

<form id="customer-enquiryForm">

<div class="grid">

<div>
<label>Full Name *</label>
<input type="text" name="fullName" required>
</div>

<div>
<label>Company Name</label>
<input type="text" name="companyName">
</div>

<div>
<label>Email Address *</label>
<input type="email" name="email" required>
</div>

<div>
<label>Mobile Number *</label>
<input type="text" name="mobile" required>
</div>

<div>
<label>Date of Pickup *</label>
<input type="date" name="pickupDate" id="pickupDate" required>
</div>

<div>
<label>Time of Pickup</label>
<input type="time" name="pickupTime" id="pickupTime">
</div>

<div>
<label>Pickup Location *</label>
<input type="text" id="origin" name="origin" required>
</div>

<div>
<label>Drop-off Location *</label>
<input type="text" id="destination" name="destination" required>
</div>

<div>
<label>Number of Passengers *</label>

<div class="row">

<div>
<label>Adult</label>
<input type="number" name="adult" min="0" value="0" required>
</div>

<div>
<label>Child &lt;4</label>
<input type="number" name="childUnder4" min="0" value="0">
</div>

<div>
<label>Child 4-7</label>
<input type="number" name="child4to7" min="0" value="0">
</div>

</div>
</div>

<div>
<label>Number of Luggage</label>

<div class="row">

<div>
<label>Small</label>
<input type="number" name="smallLuggage" min="0" value="0">
</div>

<div>
<label>Medium</label>
<input type="number" name="mediumLuggage" min="0" value="0">
</div>

<div>
<label>Large</label>
<input type="number" name="largeLuggage" min="0" value="0">
</div>

</div>
</div>

<div>
<label>Vehicle Type *</label>

<select name="vehicleType" id="vehicleType" required>

<option value="">Select Vehicle</option>
<option value="MPV 6 Seater Grand Scenic">MPV 6 Seater Grand Scenic</option>
<option value="MPV 6 Seater Alphard / Vellfire">MPV 6 Seater Alphard / Vellfire</option>
<option value="Luxury Sedan Mercedes-Benz E-Class">Luxury Sedan Mercedes-Benz E-Class</option>
<option value="Luxury Sedan Mercedes-Benz S-Class">Luxury Sedan Mercedes-Benz S-Class</option>
<option value="Luxury Sedan BMW 5 Series">Luxury Sedan BMW 5 Series</option>
<option value="Luxury Sedan BMW 7 Series">Luxury Sedan BMW 7 Series</option>

</select>
</div>

<div>
<label>Special Requirements</label>
<textarea name="specialRequirements"></textarea>
</div>

<div class="full-width consent">

<input type="checkbox" name="consent" id="consentCheckbox" required>

I agree to be contacted by LuxRide regarding my enquiry*

</div>

<div class="full-width">
<button type="submit">Submit Enquiry</button>
</div>

</div>

</form>

<div id="thankYou"></div>

</div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCU0_YSYwUpaa73zlS3Soj-ggWrkp6XH0w&libraries=places"></script>

<script>

function initAutocomplete(){

const origin=document.getElementById("origin");
const destination=document.getElementById("destination");

new google.maps.places.Autocomplete(origin,{componentRestrictions:{country:["SG","MY"]}});
new google.maps.places.Autocomplete(destination,{componentRestrictions:{country:["SG","MY"]}});

origin.value="10 Marina Boulevard, Singapore";
destination.value="Changi Airport Terminal 1 Departure, Singapore";

document.getElementById("vehicleType").value="MPV 6 Seater Grand Scenic";
document.getElementById("consentCheckbox").checked=true;

const today=new Date();

document.getElementById("pickupDate").value=today.toISOString().slice(0,10);
document.getElementById("pickupTime").value=today.toTimeString().slice(0,5);

}

window.addEventListener("load",initAutocomplete);

document.getElementById("customer-enquiryForm").addEventListener("submit",async function(e){

e.preventDefault();

const formData=new FormData(this);
const data=Object.fromEntries(formData.entries());

const intFields=['adult','childUnder4','child4to7','smallLuggage','mediumLuggage','largeLuggage'];

intFields.forEach(f=>data[f]=parseInt(data[f]||0,10));

try{

const res=await fetch("/submit-enquiry",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)

});

const result=await res.json();

if(result.success){

document.getElementById("thankYou").innerHTML=`
<span style="color:white;">

Thank you <strong>${result.fullName}</strong>, we have received your enquiry.

<br><br>

We will contact you shortly via WhatsApp or phone to confirm availability, pricing, and final arrangements.

<br><br>

If your need is urgent (within 12 hours), please contact us directly:

<br>

📱 <a href="https://support.st7007.com" target="_blank" style="color:white;text-decoration:underline;">
https://support.st7007.com
</a>

</span>
`;

this.reset();
initAutocomplete();

}
else{
document.getElementById("thankYou").innerText=result.message;
}

}
catch(err){

console.error("Error submitting enquiry:",err);
document.getElementById("thankYou").innerText="Error submitting enquiry. Please try again.";

}

});

</script>

</body>
</html>
