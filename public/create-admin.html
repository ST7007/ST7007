<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Admin - LuxRide</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    font-family: 'Montserrat', 'Roboto', 'Open Sans', Arial, sans-serif;
    background: #000;
    color: #fff;
    margin: 0;
    padding: 0;
}
header { 
    background: black;
    color: orange; 
    padding: 20px; 
    text-align: center; 
    font-size: 30px; 
    font-weight: bold; 
}
.container { 
    max-width: 400px; 
    margin: 40px auto; 
    background: #111; 
    padding: 20px; 
    border-radius: 10px; 
    box-shadow: 0 0 12px orange; 
}
label { 
    display: block; 
    margin: 10px 0 5px; 
    font-weight: bold; 
    font-size: 14px;
}
input { 
    width: 100%; 
    padding: 8px; 
    border-radius: 6px; 
    border: 2px solid orange; 
    font-size: 13px; 
    background: #fff; 
    color: #000;
    box-sizing: border-box;
}
button { 
    width: 100%; 
    padding: 10px; 
    background: orange; 
    color: #000; 
    font-weight: bold; 
    border: none; 
    border-radius: 6px; 
    cursor: pointer; 
    margin-top: 15px; 
    font-size: 15px; 
}
button:hover { background: #333; color: orange; }
#message { margin-top: 15px; font-weight: bold; color: orange; text-align: center; }
</style>
</head>
<body>

<header>Create Admin Account</header>

<div class="container">
  <form id="adminForm">
    <label>Admin Name *</label>
    <input type="text" name="name" required>

    <label>Mobile Number *</label>
    <input type="text" name="mobile" required>

    <label>Password *</label>
    <input type="password" name="password" required>

    <button type="submit">Create Admin</button>
  </form>

  <div id="message"></div>
</div>

<script>
document.getElementById("adminForm").addEventListener("submit", function(e){
    e.preventDefault();
    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());

    fetch("/create-admin", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {
        const msgDiv = document.getElementById("message");
        if(res.success){
            msgDiv.innerHTML = `✅ ${res.message}`;
            this.reset();
        } else {
            msgDiv.innerHTML = `⚠️ ${res.message}`;
        }
    })
    .catch(err => {
        document.getElementById("message").innerHTML = `⚠️ Error: ${err.message}`;
    });
});
</script>

</body>
</html>
