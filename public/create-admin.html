<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Admin - LuxRide</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    font-family: 'Montserrat', 'Roboto', 'Open Sans', Arial, sans-serif;
    font-size: 16px;
    background: #000;
    color: #fff;
    margin: 0;
    padding: 0;
}

header {
    background: black;
    color: orange;
    padding: 16px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
}

.container {
    max-width: 500px;
    margin: 30px auto;
    background: #111;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 12px orange;
    color: white;
}

label {
    font-weight: bold;
    display: block;
    margin-bottom: 7px;
    font-size: 15px;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 2px solid orange;
    font-size: 14px;
    background: #fff;
    color: #000;
    box-sizing: border-box;
    margin-bottom: 15px;
}

button {
    width: 100%;
    padding: 12px;
    background: orange;
    color: white;
    font-weight: bold;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #333;
}

#message {
    margin-top: 16px;
    font-weight: bold;
    color: orange;
    font-size: 14px;
    text-align: center;
}

@media (max-width: 600px) {
    .container {
        width: 90%;
        padding: 15px;
    }
}
</style>
</head>
<body>

<header>LuxRide - Create Admin</header>

<div class="container">
    <form id="createAdminForm">
        <label>Admin Name *</label>
        <input type="text" name="name" required>

        <label>Mobile Number *</label>
        <input type="text" name="mobile" required>

        <label>Password *</label>
        <input type="password" name="password" required>

        <button type="submit">Create Admin</button>
    </form>

    <div id="message"></div>
</div>

<script>
document.getElementById("createAdminForm").addEventListener("submit", async function(e){
    e.preventDefault();
    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());

    try {
        const res = await fetch("/create-admin", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if(result.success){
            document.getElementById("message").innerText = "Admin created successfully!";
            this.reset();
        } else {
            document.getElementById("message").innerText = result.message || "Failed to create admin";
        }
    } catch (err) {
        document.getElementById("message").innerText = "Error: " + err.message;
    }
});
</script>

</body>
</html>
