<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuxRide Super Admin Dashboard</title>
<style>
  body {
    font-family: 'Montserrat', Arial, sans-serif;
    background: #121212;
    color: #fff;
    margin: 0;
    padding: 0;
  }
  header {
    background: #1f1f1f;
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
  }
  .dashboard {
    display: flex;
    flex-wrap: wrap;
    padding: 20px;
    gap: 20px;
  }
  .card {
    background: #1f1f1f;
    flex: 1 1 200px;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
  }
  .card h2 {
    margin: 0 0 10px 0;
    font-size: 20px;
    color: #aaa;
  }
  .card p {
    font-size: 28px;
    margin: 0;
    font-weight: bold;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    background: #1f1f1f;
    border-radius: 12px;
    overflow: hidden;
  }
  th, td {
    padding: 12px 8px;
    text-align: left;
  }
  th {
    background: #2a2a2a;
    color: #fff;
  }
  tr:nth-child(even) {
    background: #1a1a1a;
  }
  .section-title {
    margin-top: 40px;
    font-size: 20px;
    border-bottom: 1px solid #333;
    padding-bottom: 5px;
  }
</style>
</head>
<body>

<header>LuxRide Super Admin Dashboard</header>

<div class="dashboard" id="summary-cards">
  <!-- Summary cards injected by JS -->
</div>

<div class="section">
  <div class="section-title">Drivers</div>
  <table id="drivers-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Full Name</th>
        <th>Phone</th>
        <th>Email</th>
        <th>Vehicle</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div class="section">
  <div class="section-title">Customers</div>
  <table id="customers-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Full Name</th>
        <th>Phone</th>
        <th>Email</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div class="section">
  <div class="section-title">Jobs</div>
  <table id="jobs-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Customer</th>
        <th>Driver</th>
        <th>Pickup</th>
        <th>Drop</th>
        <th>Status</th>
        <th>Amount</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div class="section">
  <div class="section-title">Enquiries</div>
  <table id="enquiries-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Message</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
const API_BASE = ""; // if same domain, leave empty. Otherwise: "https://yourserver.com"

// ---- Load Dashboard Summary ----
fetch(`${API_BASE}/api/dashboard/summary`)
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      const cards = [
        { title: "Total Drivers", value: data.data.total_drivers },
        { title: "Total Customers", value: data.data.total_customers },
        { title: "Active Jobs", value: data.data.active_jobs },
        { title: "Completed Jobs", value: data.data.completed_jobs },
        { title: "Pending Enquiries", value: data.data.pending_enquiries },
        { title: "Total Earnings", value: "$" + (data.data.total_earnings || 0) },
        { title: "Commission Earned", value: "$" + (data.data.commission_earned || 0) }
      ];

      const container = document.getElementById("summary-cards");
      cards.forEach(card => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<h2>${card.title}</h2><p>${card.value}</p>`;
        container.appendChild(div);
      });
    }
  });

// ---- Load Table Data Function ----
function loadTable(endpoint, tableId, columns) {
  fetch(`${API_BASE}/api/${endpoint}`)
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        const tbody = document.getElementById(tableId).querySelector("tbody");
        tbody.innerHTML = "";
        data.data.forEach(row => {
          const tr = document.createElement("tr");
          columns.forEach(col => {
            const td = document.createElement("td");
            td.textContent = row[col] || "";
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
      }
    });
}

// ---- Load All Tables ----
loadTable("drivers", "drivers-table", ["id", "fullname", "phone", "email", "vehicle"]);
loadTable("customers", "customers-table", ["id", "fullname", "phone", "email"]);
loadTable("jobs", "jobs-table", ["id", "customer_name", "driver_name", "pickup", "drop", "status", "amount"]);
loadTable("enquiries", "enquiries-table", ["id", "name", "email", "message"]);
</script>

</body>
</html>
