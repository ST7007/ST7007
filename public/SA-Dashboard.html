<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>Super Admin Dashboard</header>
<div class="container">

<h2>Enquiries</h2>
<table id="enquiriesTable">
<thead>
<tr>
<th>ID</th>
<th>Full Name</th>
<th>Company</th>
<th>Email</th>
<th>Mobile</th>
<th>Pickup Date</th>
<th>Pickup Time</th>
<th>Origin</th>
<th>Destination</th>
<th>Passengers</th>
<th>Vehicle</th>
<th>Special Requirements</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
async function loadEnquiries(){
    const tbody = document.querySelector("#enquiriesTable tbody");
    tbody.innerHTML = "<tr><td colspan='12'>Loading...</td></tr>";
    try {
        const res = await fetch("/api/enquiries");
        const result = await res.json();
        if(result.success){
            tbody.innerHTML = "";
            result.enquiries.forEach(e => {
                const passengers = `Adult:${e.adult} Child<4:${e.childUnder4} Child4-7:${e.child4to7}`;
                tbody.innerHTML += `<tr>
                    <td>${e.id}</td>
                    <td>${e.fullName}</td>
                    <td>${e.companyName || ""}</td>
                    <td>${e.email}</td>
                    <td>${e.mobile}</td>
                    <td>${e.pickupDate}</td>
                    <td>${e.pickupTime}</td>
                    <td>${e.origin}</td>
                    <td>${e.destination}</td>
                    <td>${passengers}</td>
                    <td>${e.vehicleType}</td>
                    <td>${e.specialRequirements || ""}</td>
                </tr>`;
            });
        } else {
            tbody.innerHTML = "<tr><td colspan='12'>Error loading enquiries.</td></tr>";
        }
    } catch(err){
        tbody.innerHTML = "<tr><td colspan='12'>Error loading enquiries.</td></tr>";
        console.error(err);
    }
}
window.onload = loadEnquiries;
</script>

</div>
</body>
</html>
