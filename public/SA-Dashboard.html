<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Super Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial; background: #111; color: #fff; padding: 20px; }
h2 { color: orange; margin-top: 30px; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { border: 1px solid orange; padding: 8px; text-align: left; }
th { background: #222; }
tr:nth-child(even) { background: #1a1a1a; }
</style>
</head>
<body>

<h1>Super Admin Dashboard</h1>

<h2>Drivers</h2>
<table id="driversTable">
    <thead>
        <tr><th>ID</th><th>Name</th><th>Phone</th><th>Email</th></tr>
    </thead>
    <tbody></tbody>
</table>

<h2>Customers</h2>
<table id="customersTable">
    <thead>
        <tr><th>ID</th><th>Name</th><th>Email</th><th>Mobile</th></tr>
    </thead>
    <tbody></tbody>
</table>

<h2>Enquiries</h2>
<table id="enquiriesTable">
    <thead>
        <tr><th>ID</th><th>Full Name</th><th>Email</th><th>Mobile</th><th>Pickup Date</th></tr>
    </thead>
    <tbody></tbody>
</table>

<h2>Bookings</h2>
<table id="bookingsTable">
    <thead>
        <tr><th>ID</th><th>Customer</th><th>Driver</th><th>Pickup</th><th>Dropoff</th><th>Status</th></tr>
    </thead>
    <tbody></tbody>
</table>

<script>
// Generic fetch and populate function
async function fetchAndPopulate(endpoint, tableId, columns) {
    try {
        const res = await fetch(endpoint);
        const json = await res.json();
        if (!json.success) throw new Error(json.message);

        const tbody = document.querySelector(`#${tableId} tbody`);
        tbody.innerHTML = "";
        json.data.forEach(row => {
            const tr = document.createElement("tr");
            tr.innerHTML = columns.map(col => `<td>${row[col] ?? ""}</td>`).join("");
            tbody.appendChild(tr);
        });
    } catch(err) {
        console.error(`Error fetching ${endpoint}:`, err);
    }
}

// Fetch all tables
fetchAndPopulate("/api/drivers", "driversTable", ["id","name","phone","email"]);
fetchAndPopulate("/api/customers", "customersTable", ["id","name","email","mobile"]);
fetchAndPopulate("/api/enquiries", "enquiriesTable", ["id","fullName","email","mobile","pickupDate"]);
fetchAndPopulate("/api/bookings", "bookingsTable", ["id","customerName","driverName","origin","destination","status"]);
</script>

</body>
</html>
